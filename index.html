<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conway's Game of Life</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<h1>Conway's Game of Life</h1>
<p class="subtitle">
  Click to draw cells. Older cells shift from
  <span class="color-bar"></span>
  green → cyan → indigo → purple → pink. Toggle <strong>Music</strong> for generative audio.
</p>

<div id="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>

<div class="controls">
  <button id="btn-play">▶ Play</button>
  <button id="btn-step">Step</button>
  <button id="btn-clear">Clear</button>
  <button id="btn-random">Random</button>
  <button id="btn-music">♪ Music</button>

  <label>
    Speed
    <input type="range" id="speed" min="1" max="30" value="10" />
  </label>

  <label>
    Cell size
    <input type="range" id="cell-size" min="4" max="24" value="10" />
  </label>

  <label>
    Pattern
    <select id="pattern">
      <option value="">— presets —</option>
      <option value="glider">Glider</option>
      <option value="lwss">Lightweight spaceship</option>
      <option value="pulsar">Pulsar</option>
      <option value="r-pentomino">R-pentomino</option>
      <option value="gosper">Gosper glider gun</option>
      <option value="glider-fleet">Glider fleet</option>
    </select>
  </label>
</div>

<div id="stats">Generation: <span id="gen">0</span> &nbsp;|&nbsp; Live cells: <span id="live">0</span></div>

<div class="legend">
  <span><span class="key">Space</span> play/pause</span>
  <span><span class="key">→</span> step</span>
  <span><span class="key">M</span> music</span>
  <span><span class="key">C</span> clear</span>
  <span><span class="key">R</span> random</span>
</div>

<script src="game.js"></script>
</body>
</html>
